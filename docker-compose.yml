services:

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: sims-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - APP_ENV=${APP_ENV:-production}
    networks:
      - sims-net
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:1.25-alpine
    container_name: sims-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    networks:
      - sims-net
    depends_on:
      - app

  db:
    image: mariadb:11.3
    container_name: sims-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret_root}
      MYSQL_DATABASE: ${DB_DATABASE:-sims}
      MYSQL_USER: ${DB_USERNAME:-sims}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/mariadb/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "3306:3306"
    networks:
      - sims-net

  redis:
    image: redis:7.2-alpine
    container_name: sims-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - sims-net

  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: sims-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - sims-net
    depends_on:
      - db
      - redis

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: sims-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    volumes:
      - .:/var/www/html
    networks:
      - sims-net
    depends_on:
      - db

volumes:
  db-data:
  redis-data:

networks:
  sims-net:
    driver: bridge
